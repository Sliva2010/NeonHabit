# .github/workflows/build.yml
# Автоматическая сборка Android APK при пуше в main ветку

name: Android CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Позволяет запустить workflow вручную из GitHub UI
  workflow_dispatch:

jobs:
  build:
    name: Сборка APK
    runs-on: ubuntu-latest
    # Увеличиваем таймаут для сборки Android
    timeout-minutes: 30

    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Получаем всю историю для версионирования

      # Шаг 2: Настраиваем Java
      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # Шаг 3: Настраиваем Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2
          cache-read-only: false

      # Шаг 4: Делаем gradlew исполняемым (для Unix)
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Шаг 5: Кэшируем зависимости
      - name: Кэширование зависимостей Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Шаг 6: Запускаем сборку Debug APK
      - name: Сборка Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Шаг 7: Запускаем сборку Release APK
      - name: Сборка Release APK
        run: ./gradlew assembleRelease --stacktrace

      # Шаг 8: Запускаем тесты (если есть)
      - name: Запуск тестов
        run: ./gradlew test --stacktrace
        continue-on-error: true  # Не прерываем сборку если тесты падают

      # Шаг 9: Запускаем линтер
      - name: Запуск линтера
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      # Шаг 10: Получаем информацию о версии
      - name: Получение версии приложения
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "1.0.0")
          VERSION_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts || echo "1")
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      # Шаг 11: Архивируем APK файлы
      - name: Подготовка артефактов
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/ || true
          cp app/build/outputs/apk/release/*.apk artifacts/ || true
          ls -la artifacts/

      # Шаг 12: Загружаем Debug APK как артефакт
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeonHabit-debug-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Шаг 13: Загружаем Release APK как артефакт
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NeonHabit-release-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Шаг 14: Создаём GitHub Release (только для пушей в main)
      - name: Создать GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_date }}
          name: "NeonHabit v${{ steps.version.outputs.version_name }} - ${{ steps.version.outputs.build_date }}"
          body: |
            ## 🚀 Автоматическая сборка
            
            **Версия:** ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})  
            **Дата сборки:** ${{ steps.version.outputs.build_date }}  
            **Коммит:** ${{ github.sha }}
            
            ### 📦 Скачать APK:
            - [Debug APK](#) - доступно в артефактах
            - [Release APK](#) - доступно в артефактах
            
            ### 📝 Изменения:
            ${{ github.event.head_commit.message }}
            
            ---
            *Сборка создана автоматически GitHub Actions*
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Шаг 15: Вывод информации о сборке
      - name: Информация о сборке
        run: |
          echo "✅ Сборка завершена!"
          echo "📱 Версия: ${{ steps.version.outputs.version_name }}"
          echo "🔢 Код версии: ${{ steps.version.outputs.version_code }}"
          echo "📅 Дата: ${{ steps.version.outputs.build_date }}"
          echo "🔗 Коммит: ${{ github.sha }}"
          
          # Вывод размеров APK
          echo ""
          echo "📊 Размеры APK:"
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "Debug APK не найден"
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "Release APK не найден"

  # Дополнительная задача для проверки качества кода
  code-quality:
    name: Проверка качества кода
    runs-on: ubuntu-latest
    needs: build
    if: always()  # Запускаем всегда, даже если сборка упала

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      # Проверка форматирования кода
      - name: Проверка форматирования Kotlin
        run: ./gradlew ktlintCheck --stacktrace
        continue-on-error: true
